version: '3.8'

services:
  library-app:
    build: .
    container_name: library-management
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=change-this-to-a-secure-key
      - DATABASE_URL=sqlite:///data/library.db
      - PORT=5000
    volumes:
      - library-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  library-data:
