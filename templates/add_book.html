{% extends "base.html" %}
{% block title %}添加图书 - 图书管理系统{% endblock %}

{% block content %}
<div class="form-container">
    <h1>添加图书</h1>
    <form method="POST" class="book-form">
        <div class="form-group">
            <label for="title">书名 <span class="required">*</span></label>
            <input type="text" id="title" name="title" required placeholder="请输入书名" maxlength="200">
        </div>
        <div class="form-group">
            <label for="author">作者 <span class="required">*</span></label>
            <input type="text" id="author" name="author" required placeholder="请输入作者" maxlength="100">
        </div>
        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" name="isbn" placeholder="请输入ISBN编号" maxlength="20">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="publisher">出版社</label>
                <input type="text" id="publisher" name="publisher" placeholder="请输入出版社" maxlength="100">
            </div>
            <div class="form-group">
                <label for="year">出版年份</label>
                <input type="number" id="year" name="year" placeholder="如: 2024" min="1000" max="9999">
            </div>
        </div>
        <div class="form-group">
            <label for="description">图书简介</label>
            <textarea id="description" name="description" rows="4" placeholder="请输入图书简介"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-success">保存</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
