{% extends "base.html" %}
{% block title %}编辑图书 - 图书管理系统{% endblock %}

{% block content %}
<div class="form-container">
    <h1>编辑图书</h1>
    <form method="POST" class="book-form">
        <div class="form-group">
            <label for="title">书名 <span class="required">*</span></label>
            <input type="text" id="title" name="title" value="{{ book.title }}" required maxlength="200">
        </div>
        <div class="form-group">
            <label for="author">作者 <span class="required">*</span></label>
            <input type="text" id="author" name="author" value="{{ book.author }}" required maxlength="100">
        </div>
        <div class="form-group">
            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" name="isbn" value="{{ book.isbn or '' }}" maxlength="20">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="publisher">出版社</label>
                <input type="text" id="publisher" name="publisher" value="{{ book.publisher or '' }}" maxlength="100">
            </div>
            <div class="form-group">
                <label for="year">出版年份</label>
                <input type="number" id="year" name="year" value="{{ book.year or '' }}" min="1000" max="9999">
            </div>
        </div>
        <div class="form-group">
            <label for="description">图书简介</label>
            <textarea id="description" name="description" rows="4">{{ book.description or '' }}</textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-success">更新</button>
            <a href="{{ url_for('view_book', book_id=book.id) }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
